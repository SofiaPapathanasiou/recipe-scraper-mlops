name: recipe_triton

services:
  init-data:
    image: python:3.11
    volumes:
      - recipe-nlg:/data
      - ./:/src
    command:
      - bash
      - -lc
      - |
        set -e
        apt-get update
        apt-get install -y unzip
        if [ ! -f /data/eval.jsonl ]; then
          unzip -j /src/eval.jsonl.zip -d /data
        else
          echo "eval.jsonl already exists, skipping"
         fi

        ls -l /data
    restart: "no"

  # init-models:
  #   image: python:3.11
  #   volumes:
  #     - triton-models:/models
  #     - ./:/src
  #   command:
  #     - bash
  #     - -lc
  #     - |
  #       set -ex

  #       rm -rf /models/recipe_model
  #       mkdir -p /models

  #       cp -r /src/models/recipe_model /models/

  #       echo "Copied model files:"
  #       find /models -maxdepth 8 -type f | sort
  #   restart: "no"

  init-models:
    image: python:3.11
    volumes:
      - triton-models:/models
      - /home/cc/openrc:/credentials/openrc.sh:ro
      - ./:/src
    command:
      - bash
      - -lc
      - |
        set -ex

        apt-get update
        apt-get install -y python3-pip
        pip install --no-cache-dir python-swiftclient python-keystoneclient

        source /credentials/openrc.sh

        MODEL_CONTAINER="proj22-mlflow-artifacts"
        MODEL_PREFIX="1/3e05b71354a24ee398b7a69595863751/artifacts/checkpoints/best"

        rm -rf /models/recipe_model
        mkdir -p /models/recipe_model/1

        cp /src/models/recipe_model/config.pbtxt /models/recipe_model/config.pbtxt
        cp /src/models/recipe_model/1/model.py /models/recipe_model/1/model.py

        cd /models/recipe_model/1
        swift download --ignore-checksum "$MODEL_CONTAINER" --prefix "${MODEL_PREFIX}/"

        if [ -d "${MODEL_PREFIX}" ]; then
          cp -r "${MODEL_PREFIX}/"* .
          rm -rf 1
        fi

        find /models -maxdepth 8 -type f | sort
    restart: "no"

  triton:
    build:
      context: .
      dockerfile: Dockerfile.triton
    container_name: triton_server
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - recipe-nlg:/data
      - triton-models:/models
    depends_on:
      init-data:
        condition: service_completed_successfully
      init-models:
        condition: service_completed_successfully

  jupyter:
    image: quay.io/jupyter/minimal-notebook:latest
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - ../workspace:/home/jovyan/work
      - recipe-nlg:/data
      - triton-models:/models
    command: >
      bash -c "python3 -m pip install bash_kernel 'tritonclient[all]' &&
               python3 -m bash_kernel.install --sys-prefix &&
               start-notebook.sh"

volumes:
  recipe-nlg:
  triton-models: