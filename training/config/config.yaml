model:
  name: t5-small
  task_prefix: "fix recipe: "

tokenization:
  max_input_length: 512
  max_target_length: 512

training:
  learning_rate: 1.0e-4
  weight_decay: 0.01
  num_epochs: 5
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 128
  gradient_accumulation_steps: 1
  warmup_ratio: 0.10
  max_grad_norm: 1.0
  seed: 42

accelerate:
  compute_environment: LOCAL_MACHINE
  distributed_type: MULTI_GPU
  num_processes: auto
  # Primary precision knob for train and tune runs.
  mixed_precision: bf16
  dynamo_backend: "no"

runtime:
  torch_build_mode: auto
  jupyter_token: ""

evaluation:
  logging_steps: 50
  every_n_epochs: 1
  full_generation_every_n_epochs: 3
  interim_max_eval_batches: 8
  full_max_eval_batches:
  generation_max_new_tokens: 256
  run_on_last_epoch: true
  eval_steps: 500
  metric_for_best_model: eval_rougeL

checkpointing:
  checkpoint_dir: /app/checkpoints/recipe-correction
  load_best_model_at_end: true
  # When false, only the best checkpoint is kept locally under
  # <checkpoint_dir>/<run_id-or-manual-run>/best for crash-safe recovery.
  save_intermediate_checkpoints: false

huggingface:
  # Local dev uses the bind-mounted checkpoints volume at /app/checkpoints.
  # The Kubernetes Job overrides this to /data/checkpoints/huggingface-cache.
  cache_dir: /app/checkpoints/huggingface-cache

mlflow:
  tracking_uri: http://192.168.1.11:30800/
  experiment_name: recipe-correction-t5-baseline
  tuning_experiment_name: recipe-correction-t5-optuna
  # Keep training successful when the final MLflow artifact upload flakes out after the
  # best checkpoint has already been saved locally. Set true to make uploads strict.
  fail_on_artifact_logging_error: false

model_registry:
  log_to_mlflow_model_registry: true
  model_name: recipe-correction-t5

data:
  source: jsonl
  train_file: train.jsonl
  eval_file: eval.jsonl
  data_dir:
  # Keep evaluation fed on larger GPUs like H100 while staying reasonable on shared hosts.
  num_workers: 8
  prefetch_factor: 4
  mock_train_size: 200
  mock_val_size: 40
