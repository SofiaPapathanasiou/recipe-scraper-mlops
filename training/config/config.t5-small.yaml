model:
  name: t5-small
  task_prefix: "fix recipe: "

tokenization:
  max_input_length: 256
  max_target_length: 256

training:
  learning_rate: 1.0e-4
  weight_decay: 0.01
  num_epochs: 5
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 128
  gradient_accumulation_steps: 1
  warmup_ratio: 0.10
  max_grad_norm: 1.0
  seed: 42

accelerate:
  compute_environment: LOCAL_MACHINE
  distributed_type: MULTI_GPU
  num_processes: auto
  mixed_precision: bf16
  dynamo_backend: "no"

runtime:
  torch_build_mode: auto
  jupyter_token: ""

evaluation:
  logging_steps: 50
  every_n_epochs: 2
  run_on_last_epoch: true
  eval_steps: 500
  metric_for_best_model: eval_rougeL

checkpointing:
  checkpoint_dir: /app/checkpoints/recipe-correction
  load_best_model_at_end: true
  save_intermediate_checkpoints: false

huggingface:
  cache_dir: /app/checkpoints/huggingface-cache

mlflow:
  tracking_uri: http://192.168.1.11:30800/
  experiment_name: recipe-correction-t5-small-baseline
  tuning_experiment_name: recipe-correction-t5-small-optuna

model_registry:
  log_to_mlflow_model_registry: true
  model_name: recipe-correction-t5-small


data:
  source: jsonl
  train_file: train.jsonl
  eval_file: eval.jsonl
  data_dir:
  num_workers: auto
  prefetch_factor: 2
  mock_train_size: 200
  mock_val_size: 40
