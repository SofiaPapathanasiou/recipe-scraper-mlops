model:
  name: t5-large
  task_prefix: "fix recipe: "

tokenization:
  max_input_length: 192
  max_target_length: 192

training:
  learning_rate: 1.0e-4
  weight_decay: 0.01
  num_epochs: 5
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  warmup_ratio: 0.10
  max_grad_norm: 1.0
  seed: 42

accelerate:
  compute_environment: LOCAL_MACHINE
  distributed_type: MULTI_GPU
  num_processes: 1
  mixed_precision: fp16
  dynamo_backend: "no"

evaluation:
  logging_steps: 10
  eval_steps: 500
  metric_for_best_model: eval_rougeL

checkpointing:
  checkpoint_dir: /app/checkpoints/recipe-correction
  load_best_model_at_end: true
  save_intermediate_checkpoints: false

huggingface:
  cache_dir: /app/checkpoints/huggingface-cache

mlflow:
  experiment_name: recipe-correction-t5-large-baseline
  tuning_experiment_name: recipe-correction-t5-large-optuna

model_registry:
  log_to_mlflow_model_registry: true
  model_name: recipe-correction-t5-large


data:
  source: jsonl
  train_file: train.jsonl
  eval_file: eval.jsonl
  data_dir:
  mock_train_size: 200
  mock_val_size: 40
