default:
  direction: maximize
  n_trials: 5
  timeout_sec: null
  storage: null
  sampler:
    type: tpe
    seed: 42
  pruner:
    type: median
    n_startup_trials: 2
    n_warmup_steps: 1
  search_space:
    training.learning_rate:
      type: float
      low: 1.0e-5
      high: 1.0e-3
      log: true
    training.weight_decay:
      type: float
      low: 0.0
      high: 0.1
    training.warmup_ratio:
      type: float
      low: 0.0
      high: 0.2

models:
  t5-small:
    search_space:
      training.learning_rate:
        type: categorical
        choices: [1.0e-4, 1.5e-4, 2.0e-4]
      training.gradient_accumulation_steps:
        type: categorical
        choices: [1, 2]
      training.per_device_train_batch_size:
        type: categorical
        choices: [32, 48, 64]

  t5-base:
    search_space:
      training.learning_rate:
        type: categorical
        choices: [1.0e-4, 1.5e-4, 2.0e-4]
      training.gradient_accumulation_steps:
        type: categorical
        choices: [1, 2]
      training.per_device_train_batch_size:
        type: categorical
        choices: [8, 12, 16]

  t5-large:
    search_space:
      training.learning_rate:
        type: categorical
        choices: [1.0e-4, 1.2e-4, 1.5e-4]
      training.gradient_accumulation_steps:
        type: categorical
        choices: [1, 2]
      training.per_device_train_batch_size:
        type: categorical
        choices: [4, 6, 8]
