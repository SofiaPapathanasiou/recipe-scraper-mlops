# Recipe correction training stack
# Services: Jupyter, Training

x-runtime-env: &runtime-env
  MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://129.114.26.23:8000/}

services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: jupyter
    restart: unless-stopped
    init: true
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_LAB_EXTENSION_MANAGER: "none"
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-}
      TORCH_BUILD_MODE: ${TORCH_BUILD_MODE:-auto}
      PROJECT_ROOT: /app
      PYTHONPATH: /app
      VENV_PATH: /opt/venv
      TRAIN_SCRIPT: /app/train.py
      TRAIN_CONFIG: /app/config.yaml
      ACCELERATE_CONFIG_FILE: /app/accelerate_config.yaml
      NUM_PROCESSES: ${NUM_PROCESSES:-2}
      <<: *runtime-env
    working_dir: /app
    command:
      - bash
      - -lc
      - |
        bash /app/scripts/select_torch_build.sh && \
        exec /opt/venv/bin/jupyter lab \
          --ip=0.0.0.0 \
          --port=8888 \
          --no-browser \
          --allow-root \
          --notebook-dir=/app/notebooks \
          --ServerApp.token="${JUPYTER_TOKEN:-}" \
          --ServerApp.password='' \
          --ServerApp.allow_origin='*' \
          --ServerApp.disable_check_xsrf=True
    ports:
      - "8888:8888"
    volumes:
      - .:/app
      - ../.git:/app/.git:ro
    gpus: all

  training:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: training
    profiles:
      - training
    restart: "no"
    environment:
      NUM_PROCESSES: ${NUM_PROCESSES:-2}
      <<: *runtime-env
    volumes:
      - .:/app
      - ../.git:/app/.git:ro
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
    gpus: all
