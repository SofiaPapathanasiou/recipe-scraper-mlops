# Recipe correction training stack
# Services: Jupyter, Training

services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: jupyter
    restart: unless-stopped
    init: true
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_LAB_EXTENSION_MANAGER: "none"
      PROJECT_ROOT: /app
      PYTHONPATH: /app
      VENV_PATH: /opt/venv
      TRAIN_SCRIPT: /app/train.py
      TRAIN_CONFIG: /app/config/config.yaml
    working_dir: /app
    command:
      - bash
      - -lc
      - |
        if [ -z "${JUPYTER_TOKEN:-}" ]; then
          JUPYTER_TOKEN="$(
            python - "${TRAIN_CONFIG:-/app/config/config.yaml}" <<'PY'
import sys

import yaml

with open(sys.argv[1], "r", encoding="utf-8") as handle:
    config = yaml.safe_load(handle) or {}

print(config.get("runtime", {}).get("jupyter_token", ""))
PY
          )"
          export JUPYTER_TOKEN
        fi
        bash /app/scripts/select_torch_build.sh && \
        exec /opt/venv/bin/jupyter lab \
          --ip=0.0.0.0 \
          --port=8888 \
          --no-browser \
          --allow-root \
          --notebook-dir=/app/notebooks \
          --ServerApp.token="${JUPYTER_TOKEN:-}" \
          --ServerApp.password='' \
          --ServerApp.allow_origin='*' \
          --ServerApp.disable_check_xsrf=True
    ports:
      - "8888:8888"
    volumes:
      - .:/app
      - ../.git:/app/.git:ro
    gpus: all

  training:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: training
    profiles:
      - training
    restart: "no"
    volumes:
      - .:/app
      - ../.git:/app/.git:ro
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
    # Production training is GPU-only by design.
    gpus: all
