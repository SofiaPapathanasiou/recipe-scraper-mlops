# ─────────────────────────────────────────────
# Recipe Correction MLOps Stack
# Services: MinIO · PostgreSQL · MLFlow · Redis · Jupyter · Training
# ─────────────────────────────────────────────

networks:
  mlops-net:
    driver: bridge

volumes:
  minio-data:
  postgres-data:
  redis-data:
  jupyter-data:        # persists notebooks across container restarts

services:

  # ── 1. MinIO ─ S3-compatible object storage ──────────────────────────────
  # Stores: raw datasets, processed data, model artifacts, MLFlow artifacts
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"      # S3 API
      - "9001:9001"      # Web console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - mlops-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Automatically create required buckets on first startup
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - mlops-net
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
        mc mb --ignore-existing local/mlflow-artifacts;
        mc mb --ignore-existing local/recipe-datasets;
        mc mb --ignore-existing local/model-registry;
        mc mb --ignore-existing local/production-feedback;
        echo 'Buckets created.';
      "

  # ── 2. PostgreSQL ─ MLFlow metadata backend ──────────────────────────────
  # Replaces SQLite. Handles concurrent writes and survives restarts cleanly.
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow123}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mlops-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 3. MLFlow ─ Experiment tracking + Model Registry ────────────────────
  # Backend: PostgreSQL | Artifact store: MinIO (S3-compatible)
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"      # MLFlow UI → http://localhost:5000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: >
      bash -c "pip install psycopg2-binary boto3 -q &&
               mlflow server
                 --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow123}@postgres:5432/${POSTGRES_DB:-mlflow}
                 --default-artifact-root s3://mlflow-artifacts/
                 --host 0.0.0.0
                 --port 5000"
    networks:
      - mlops-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── 3. Redis ─ Feature store + Production feedback queue ─────────────────
  # Used for:
  #   - Caching recipe feature vectors (tokenized inputs) during serving
  #   - Queuing user feedback (corrected recipes) for retraining trigger
  #   - Tracking retraining metadata (last_retrain_ts, feedback_count, etc.)
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - mlops-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── 4. Redis Insight ─ GUI for Redis ─────────────────────────────────────
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: unless-stopped
    ports:
      - "5540:5540"      # Redis GUI → http://localhost:5540
    depends_on:
      - redis
    networks:
      - mlops-net

  # ── 5. Jupyter Lab ─ Interactive experimentation ─────────────────────────
  # Uses the same image as the training container so imports match exactly.
  # Notebooks are persisted in a named volume AND bind-mounted to ./notebooks
  # so they're committed to git alongside the code.
  #
  # Access: http://localhost:8888  (token printed in logs on first start)
  # To get the token: docker compose logs jupyter | grep token
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: jupyter
    restart: unless-stopped
    ports:
      - "8888:8888"
    depends_on:
      mlflow:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Same env as training — notebooks can call train.py helpers directly
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET_DATASETS: recipe-datasets
      MINIO_BUCKET_MODELS: model-registry
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Jupyter config
      JUPYTER_ENABLE_LAB: "yes"
      # Set a fixed token via .env — avoids hunting through logs every restart
      # Leave blank to get a random token (more secure, less convenient)
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-}
    volumes:
      # Bind-mount ./notebooks so files are committed to git
      - ./notebooks:/app/notebooks
      # Also mount training source so you can import from it in notebooks
      - .:/app/training
      - ./data:/app/data
    working_dir: /app/notebooks
    # Override the training CMD — launch Jupyter Lab instead
    command: >
      jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --notebook-dir=/app/notebooks
        --ServerApp.token=${JUPYTER_TOKEN:-}
        --ServerApp.password=''
        --ServerApp.allow_origin='*'
        --ServerApp.disable_check_xsrf=True
    networks:
      - mlops-net

  # ── 6. Training Container ─ T5 fine-tuning job ───────────────────────────
  # Run on-demand (not always-on). Start with:
  #   docker compose run --rm training python train.py
  training:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: training
    profiles: ["training"]
    restart: "no"        # One-shot job, not a daemon
    depends_on:
      mlflow:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # MLFlow
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET_DATASETS: recipe-datasets
      MINIO_BUCKET_MODELS: model-registry
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Training config (override via .env or CLI)
      MODEL_NAME: t5-small
      MAX_INPUT_LENGTH: 512
      MAX_TARGET_LENGTH: 512
      TRAIN_BATCH_SIZE: 8
      EVAL_BATCH_SIZE: 8
      NUM_EPOCHS: 3
      LEARNING_RATE: 3e-4
      EXPERIMENT_NAME: recipe-correction-t5
    volumes:
      - .:/app
      - ./data:/app/data
    networks:
      - mlops-net
