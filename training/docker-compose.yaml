# Recipe correction MLOps stack
# Services: MinIO, PostgreSQL, MLflow, Redis, Redis Insight, Jupyter, Training

x-mlops-network: &mlops-network
  networks:
    - mlops-net

x-minio-credentials: &minio-credentials
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}

x-runtime-env: &runtime-env
  MLFLOW_TRACKING_URI: http://mlflow:5000
  MLFLOW_S3_ENDPOINT_URL: http://minio:9000
  MINIO_ENDPOINT: minio:9000
  MINIO_BUCKET_DATASETS: ${MINIO_BUCKET_DATASETS:-recipe-datasets}
  MINIO_BUCKET_MODELS: ${MINIO_BUCKET_MODELS:-model-registry}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  <<: *minio-credentials

x-runtime-depends-on: &runtime-depends-on
  mlflow:
    condition: service_healthy
  minio:
    condition: service_healthy
  minio-init:
    condition: service_completed_successfully
  redis:
    condition: service_healthy

networks:
  mlops-net:
    driver: bridge

volumes:
  minio-data:
  postgres-data:
  redis-data:

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    <<: *mlops-network

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ec
      - |
        echo "Waiting for MinIO..."
        until mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-minioadmin}" "${MINIO_ROOT_PASSWORD:-minioadmin123}"; do
          sleep 2
        done
        echo "Creating buckets..."
        mc mb --ignore-existing local/mlflow-artifacts
        mc mb --ignore-existing local/recipe-datasets
        mc mb --ignore-existing local/model-registry
        mc mb --ignore-existing local/production-feedback
        echo "MinIO setup complete."
    <<: *mlops-network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow123}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow} -d ${POSTGRES_DB:-mlflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *mlops-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      # Tracking server (uvicorn): Host header must match (browser sends host:port). Override in .env for public DNS or IPs.
      # Patterns: 10.*, 172.*, 192.168.* (see MLflow network security docs). Add explicit host:5000 if still rejected.
      MLFLOW_SERVER_ALLOWED_HOSTS: ${MLFLOW_SERVER_ALLOWED_HOSTS:-mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,0.0.0.0,192.168.*,10.*,172.*}
      MLFLOW_HTTP_GATEWAY_ALLOW_HOSTS: "*"
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_FORCE_PATH_STYLE: "true"
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow123}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
      GUNICORN_CMD_ARGS: "--proxy-allow-from * --forwarded-allow-ips *"
      <<: *minio-credentials
    command:
      - bash
      - -lc
      - |
        pip install psycopg2-binary boto3 -q && \
        exec mlflow server \
          --backend-store-uri "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}" \
          --default-artifact-root "s3://mlflow-artifacts" \
          --host 0.0.0.0 \
          --port 5000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    <<: *mlops-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    <<: *mlops-network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5540:5540"
    <<: *mlops-network

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: jupyter
    restart: unless-stopped
    init: true
    depends_on: *runtime-depends-on
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_LAB_EXTENSION_MANAGER: "none"
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-}
      TORCH_BUILD_MODE: ${TORCH_BUILD_MODE:-auto}
      PROJECT_ROOT: /workspace
      VENV_PATH: /opt/venv
      <<: *runtime-env
    working_dir: /workspace/notebooks
    command:
      - bash
      - -lc
      - |
        bash /workspace/scripts/select_torch_build.sh && \
        exec /opt/venv/bin/jupyter lab \
          --ip=0.0.0.0 \
          --port=8888 \
          --no-browser \
          --allow-root \
          --notebook-dir=/workspace/notebooks \
          --ServerApp.token="${JUPYTER_TOKEN:-}" \
          --ServerApp.password='' \
          --ServerApp.allow_origin='*' \
          --ServerApp.disable_check_xsrf=True
    ports:
      - "8888:8888"
    volumes:
      - .:/workspace
    gpus: all
    <<: *mlops-network

  training:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: training
    profiles:
      - training
    restart: "no"
    depends_on: *runtime-depends-on
    environment:
      MODEL_NAME: ${MODEL_NAME:-t5-small}
      MAX_INPUT_LENGTH: ${MAX_INPUT_LENGTH:-512}
      MAX_TARGET_LENGTH: ${MAX_TARGET_LENGTH:-512}
      TRAIN_BATCH_SIZE: ${TRAIN_BATCH_SIZE:-8}
      EVAL_BATCH_SIZE: ${EVAL_BATCH_SIZE:-8}
      NUM_EPOCHS: ${NUM_EPOCHS:-3}
      LEARNING_RATE: ${LEARNING_RATE:-0.0003}
      EXPERIMENT_NAME: ${EXPERIMENT_NAME:-recipe-correction-t5}
      <<: *runtime-env
    volumes:
      - .:/app
    gpus: all
    <<: *mlops-network
