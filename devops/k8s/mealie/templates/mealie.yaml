{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mealie-pvc
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
{{ toYaml .Values.persistence.accessModes | indent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  storageClassName: {{ .Values.persistence.storageClassName | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: mealie
  template:
    metadata:
      labels:
        app: mealie
    spec:
      containers:
      - name: mealie
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
        resources:
{{ toYaml .Values.resources | indent 10 }}
        env:
        - name: PUID
          value: {{ .Values.env.puid | quote }}
        - name: PGID
          value: {{ .Values.env.pgid | quote }}
        - name: TZ
          value: {{ .Values.env.timezone | quote }}
        - name: TRITON_SERVER_URL
          value: {{ .Values.env.tritonServerUrl | quote }}
        - name: TRITON_MODEL_NAME
          value: {{ .Values.env.tritonModelName | quote }}
        - name: API_DOCS
          value: {{ .Values.env.apiDocs | quote }}
        - name: MODEL_VERSION
          value: {{ .Values.env.modelVersion | quote }}
{{- with .Values.env.extra }}
{{ toYaml . | indent 8 }}
{{- end }}
        volumeMounts:
        - name: mealie-data
          mountPath: /app/data
      volumes:
      - name: mealie-data
{{- if .Values.persistence.enabled }}
        persistentVolumeClaim:
          claimName: mealie-pvc
{{- else }}
        emptyDir: {}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: mealie
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: mealie
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    nodePort: {{ .Values.service.nodePort }}
