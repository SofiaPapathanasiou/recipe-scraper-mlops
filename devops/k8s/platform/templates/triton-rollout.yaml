{{- if .Values.triton.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: recipe-triton
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: recipe-triton
  template:
    metadata:
      labels:
        app: recipe-triton
    spec:
{{- with .Values.triton.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
      runtimeClassName: {{ .Values.triton.runtimeClassName }}
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: init-models
          image: python:3.11
          command:
            - bash
            - -lc
            - |
              set -ex

              pip install --no-cache-dir python-swiftclient python-keystoneclient

              source /openrc/openrc

              MODEL_CONTAINER="ObjStore_proj22"
              MODEL_PREFIX="{{ .Values.triton.modelPrefix }}"

              rm -rf /models/model-repo/recipe_model
              mkdir -p /models/model-repo/recipe_model/1

              # Copy model src from configmap
              cp /src/config.pbtxt /models/model-repo/recipe_model/config.pbtxt
              cp /src/model.py /models/model-repo/recipe_model/1/model.py
              cp /src/requirements.txt /models/model-repo/recipe_model/1/requirements.txt

              # Download weights from Swift
              cd /models/model-repo/recipe_model/1
              swift download --ignore-checksum "$MODEL_CONTAINER" --prefix "${MODEL_PREFIX}/"

              if [ -d "${MODEL_PREFIX}" ]; then
                cp -r "${MODEL_PREFIX}/"* .
                rm -rf $(echo "${MODEL_PREFIX}" | cut -d'/' -f1)
              fi

              find /models -maxdepth 8 -type f | sort
          volumeMounts:
            - name: triton-models
              mountPath: /models
            - name: model-src
              mountPath: /src
            - name: openrc
              mountPath: /openrc
              readOnly: true

      containers:
        - name: triton
          env:
            - name: VERSION
              value: "v4"
          image: "{{ .Values.triton.image.repository }}:{{ .Values.triton.image.tag }}"
          imagePullPolicy: {{ .Values.triton.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - >
              tritonserver
              --model-repository=/models/model-repo
              --allow-http=true
              --allow-grpc=true
              --allow-metrics=true
              --exit-on-error=false
          ports:
            - name: http
              containerPort: 8000
            - name: grpc
              containerPort: 8001
            - name: metrics
              containerPort: 8002
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: "4"
              memory: "12Gi"
            requests:
              cpu: "2"
              memory: "8Gi"
          volumeMounts:
            - name: triton-models
              mountPath: /models

      volumes:
        - name: triton-models
          {{- if .Values.triton.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.triton.persistence.claimName }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: model-src
          configMap:
            name: triton-model-src
        - name: openrc
          secret:
            secretName: {{ .Values.triton.openrc.existingSecret }}

  strategy:
    canary:
      maxSurge: {{ .Values.triton.rollout.maxSurge }}
      maxUnavailable: {{ .Values.triton.rollout.maxUnavailable }}
      steps:
        - pause:
            duration: 120s
        - analysis:
            templates:
              - templateName: recipe-triton-analysis
            args:
            - name: model-version
              value: "{{ .Values.triton.image.tag }}" 
        - pause:
            duration: 120s
        - analysis:
            templates:
              - templateName: recipe-triton-analysis
            args:
            - name: model-version
              value: "{{ .Values.triton.image.tag }}"
{{- end }}
