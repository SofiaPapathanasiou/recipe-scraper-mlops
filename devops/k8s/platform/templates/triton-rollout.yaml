{{- if .Values.triton.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: recipe-triton
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: recipe-triton
  template:
    metadata:
      labels:
        app: recipe-triton
    spec:
      nodeSelector:
        kubernetes.io/hostname: gpu-node
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: init-models
          image: python:3.11
          command:
            - bash
            - -lc
            - |
              set -ex

              pip install --no-cache-dir python-swiftclient python-keystoneclient

              source /openrc/openrc

              MODEL_CONTAINER="proj22-mlflow-artifacts"
              MODEL_PREFIX="1/3e05b71354a24ee398b7a69595863751/artifacts/checkpoints/best"

              rm -rf /models/recipe_model
              mkdir -p /models/recipe_model/1

              cp /src/config.pbtxt /models/recipe_model/config.pbtxt
              cp /src/model.py /models/recipe_model/1/model.py
              cp /src/requirements.txt /models/recipe_model/1/requirements.txt

              cd /models/recipe_model/1
              swift download --ignore-checksum "$MODEL_CONTAINER" --prefix "${MODEL_PREFIX}/"

              if [ -d "${MODEL_PREFIX}" ]; then
                cp -r "${MODEL_PREFIX}/"* .
                rm -rf $(echo "${MODEL_PREFIX}" | cut -d'/' -f1)
              fi

              find /models -maxdepth 8 -type f | sort
          volumeMounts:
            - name: triton-models
              mountPath: /models
            - name: model-src
              mountPath: /src
            - name: openrc
              mountPath: /openrc
              readOnly: true
      containers:
        - name: triton
          env:
            - name: VERSION
              value: "v3"
          image: "{{ .Values.triton.image.repository }}:{{ .Values.triton.image.tag }}"
          imagePullPolicy: {{ .Values.triton.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - >
              tritonserver
              --model-repository=/models
              --allow-http=true
              --allow-grpc=true
              --allow-metrics=true
          ports:
            - name: http
              containerPort: 8000
            - name: grpc
              containerPort: 8001
            - name: metrics
              containerPort: 8002
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: "4"
              memory: "12Gi"
            requests:
              cpu: "2"
              memory: "8Gi"
          volumeMounts:
            - name: triton-models
              mountPath: /models
      volumes:
        - name: triton-models
          emptyDir: {}
        - name: model-src
          configMap:
            name: triton-model-src
        - name: openrc
          secret:
            secretName: {{ .Values.triton.openrc.existingSecret }}
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause:
            duration: 120s
        - analysis:
            templates:
              - templateName: recipe-triton-analysis
        - setWeight: 100
{{- end }}
