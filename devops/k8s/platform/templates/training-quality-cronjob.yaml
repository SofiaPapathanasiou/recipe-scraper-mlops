{{- if .Values.data.trainingQuality.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: training-quality-check
  namespace: {{ .Release.Namespace }}
spec:
  schedule: {{ .Values.data.trainingQuality.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
{{- with .Values.data.trainingQuality.nodeSelector }}
          nodeSelector:
{{ toYaml . | indent 12 }}
{{- end }}
{{- with .Values.data.trainingQuality.tolerations }}
          tolerations:
{{ toYaml . | indent 12 }}
{{- end }}
          restartPolicy: OnFailure
          containers:
            - name: training-quality
              image: "{{ .Values.data.jobs.image.repository }}:{{ .Values.data.jobs.image.tag }}"
              imagePullPolicy: {{ .Values.data.jobs.image.pullPolicy }}
              command:
                - /bin/sh
                - -c
                - python /app/scripts/02_quality_training.py
              env:
                - name: DATA_ROOT
                  value: {{ .Values.data.jobs.mountPath | quote }}
                - name: PYTHONPATH
                  value: /app
              resources:
{{ toYaml .Values.data.trainingQuality.resources | indent 16 }}
              volumeMounts:
                - name: data
                  mountPath: {{ .Values.data.jobs.mountPath | quote }}
          volumes:
            - name: data
              {{- if .Values.data.persistence.enabled }}
              persistentVolumeClaim:
                claimName: {{ .Values.data.trainingQuality.existingClaim | default .Values.data.persistence.claimName }}
              {{- else }}
              emptyDir: {}
              {{- end }}
{{- end }}
