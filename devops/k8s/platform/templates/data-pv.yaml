{{- if .Values.data.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.data.persistence.claimName }}
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - {{ .Values.data.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.data.persistence.size }}
  {{- if .Values.data.persistence.storageClass }}
  storageClassName: {{ .Values.data.persistence.storageClass | quote }}
  {{- end }}
  {{- if .Values.data.persistence.volumeName }}
  volumeName: {{ .Values.data.persistence.volumeName | quote }}
  {{- end }}
{{- end }}

{{- if .Values.triton.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.triton.persistence.claimName }}
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.triton.persistence.size }}
  storageClassName: {{ .Values.triton.persistence.storageClass }}
  volumeName: data-pv-gpu-node2
{{- end }}
