apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: recipe-triton
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SofiaPapathanasiou/recipe-scraper-mlops
    targetRevision: HEAD
    path: devops/k8s/platform
    helm:
      valueFiles:
      - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: recipe-scraper-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
