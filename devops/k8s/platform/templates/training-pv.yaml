apiVersion: v1
kind: PersistentVolume
metadata:
  name: training-pv
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  hostPath:
    path: /home/cc/recipe-scraper-mlops/training
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: training-pvc
  namespace: recipe-scraper-platform
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  volumeName: training-pv
  storageClassName: ""
