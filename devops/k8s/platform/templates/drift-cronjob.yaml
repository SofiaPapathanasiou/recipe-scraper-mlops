{{- if .Values.data.driftMonitor.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: drift-monitor
  namespace: {{ .Release.Namespace }}
spec:
  schedule: {{ .Values.data.driftMonitor.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: drift-monitor
              image: "{{ .Values.data.jobs.image.repository }}:{{ .Values.data.jobs.image.tag }}"
              imagePullPolicy: {{ .Values.data.jobs.image.pullPolicy }}
              command:
                - /bin/sh
                - -c
                - python /app/scripts/06_monitor_drift.py
              env:
                - name: DATA_ROOT
                  value: {{ .Values.data.jobs.mountPath | quote }}
                - name: PYTHONPATH
                  value: /app
              resources:
{{ toYaml .Values.data.driftMonitor.resources | indent 16 }}
              volumeMounts:
                - name: data
                  mountPath: {{ .Values.data.jobs.mountPath | quote }}
          volumes:
            - name: data
              {{- if .Values.data.persistence.enabled }}
              persistentVolumeClaim:
                claimName: {{ .Values.data.driftMonitor.existingClaim | default .Values.data.persistence.claimName }}
              {{- else }}
              emptyDir: {}
              {{- end }}
{{- end }}
