{{- if and .Values.postgres.persistence.enabled .Values.postgres.persistence.hostLocal.enabled }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.postgres.persistence.hostLocal.pvName }}
spec:
  capacity:
    storage: {{ .Values.postgres.persistence.size }}
  accessModes:
    - {{ .Values.postgres.persistence.accessMode }}
  persistentVolumeReclaimPolicy: {{ .Values.postgres.persistence.hostLocal.reclaimPolicy }}
  {{- if .Values.postgres.persistence.storageClass }}
  storageClassName: {{ .Values.postgres.persistence.storageClass | quote }}
  {{- else }}
  storageClassName: ""
  {{- end }}
  local:
    path: {{ .Values.postgres.persistence.hostLocal.path | quote }}
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - {{ .Values.postgres.persistence.hostLocal.nodeHostname | quote }}
{{- end }}
{{- if and .Values.postgres.persistence.enabled (not .Values.postgres.persistence.existingClaim) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - {{ .Values.postgres.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
  {{- if .Values.postgres.persistence.hostLocal.enabled }}
  volumeName: {{ .Values.postgres.persistence.hostLocal.pvName }}
  {{- end }}
  {{- if .Values.postgres.persistence.storageClass }}
  storageClassName: {{ .Values.postgres.persistence.storageClass | quote }}
  {{- else if .Values.postgres.persistence.hostLocal.enabled }}
  storageClassName: ""
  {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      {{- with .Values.postgres.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ default "postgres-credentials" .Values.postgres.auth.existingSecret }}
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default "postgres-credentials" .Values.postgres.auth.existingSecret }}
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ default "postgres-credentials" .Values.postgres.auth.existingSecret }}
                  key: dbname
          ports:
            - containerPort: {{ .Values.postgres.service.port }}
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          {{- if .Values.postgres.persistence.enabled }}
          persistentVolumeClaim:
            {{- if .Values.postgres.persistence.existingClaim }}
            claimName: {{ .Values.postgres.persistence.existingClaim }}
            {{- else }}
            claimName: postgres-pvc
            {{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: postgres
  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: {{ .Values.postgres.service.port }}
