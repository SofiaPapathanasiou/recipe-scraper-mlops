---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: recipe-scraper-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.9.0
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1"
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://0.0.0.0:8000
            - name: MLFLOW_SERVER_ALLOWED_HOSTS
              value: "*"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: dbname
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install psycopg2-binary &&
              mlflow server --backend-store-uri "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}" \
              --artifacts-destination /mlflow-artifacts/ --serve-artifacts --host 0.0.0.0 --port 8000
         volumeMounts:
  	    - name: mlflow-artifacts
    	      mountPath: /mlflow/artifacts
      volumes:
        - name: mlflow-artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-artifacts-pvc
  namespace: recipe-scraper-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: gourmetgram-platform
spec:
  selector:
    app: mlflow
  ports:
    - port: 8000
      targetPort: 8000
  externalIPs:
    - {{ .Values.mlflow.externalIP }}
