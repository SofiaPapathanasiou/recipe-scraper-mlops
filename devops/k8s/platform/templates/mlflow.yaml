apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      nodeSelector:
        kubernetes.io/hostname: node4
      initContainers:
      - name: wait-for-postgres
        image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
        imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: {{ default "postgres-credentials" .Values.postgres.auth.existingSecret }}
              key: username
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: {{ default "postgres-credentials" .Values.postgres.auth.existingSecret }}
              key: dbname
        command:
        - /bin/sh
        - -c
        - until pg_isready -h postgres -p {{ .Values.postgres.service.port }} -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 2; done
