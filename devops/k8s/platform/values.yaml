namespace:
  create: true

postgres:
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
    storageClass: ""
  auth:
    existingSecret: ""
    username: user
    password: password
    database: mlflowdb

mlflow:
  image:
    repository: ghcr.io/mlflow/mlflow
    tag: "v3.9.0"
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 8000
    nodePort: 30800
  trackingUri: "http://0.0.0.0:8000"
  loggingLevel: "ERROR"
  allowedHosts: "*"
  s3:
    endpointUrl: "https://chi.tacc.chameleoncloud.org:7480"
    existingSecret: ""
    accessKeyId: ""
    secretAccessKey: ""
    bucketName: ""
  resources:
    requests:
      memory: "1Gi"
      cpu: "200m"
    limits:
      memory: "2Gi"
      cpu: "1"

data:
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
    storageClass: ""
  jobs:
    image:
      repository: recipe-scraper-data
      tag: "latest"
      pullPolicy: IfNotPresent
    mountPath: /data
  trainingQuality:
    enabled: true
    schedule: "0 0 * * 1,4"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  driftMonitor:
    enabled: true
    schedule: "0 * * * *"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

trainingJob:
  enabled: false
  backoffLimit: 0
  nodeSelector:
    kubernetes.io/hostname: gpu-node
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  image:
    repository: recipe-scraper-training
    tag: "latest"
    pullPolicy: IfNotPresent
  storage:
    enabled: true
    # Legacy catch-all root for datasets and training outputs.
    # Prefer the split mount paths below when those locations need to diverge.
    mountPath: /data
    # Optional explicit mount points for the shared training volume.
    # When set, the chart mounts the same volume at each distinct path.
    datasetMountPath: /data
    checkpointMountPath: /data/checkpoints
    hfCacheMountPath: /data/checkpoints/huggingface-cache
  env:
    trainScript: /app/train.py
    trainConfig: /app/config/config.yaml
    trainMode: train
    dataDir: /data
    trainJsonlPath: ""
    evalJsonlPath: ""
    checkpointDir: /data/checkpoints/recipe-correction
    hfCacheDir: /data/checkpoints/huggingface-cache
    numProcesses: "1"
    extraArgs: ""
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
      nvidia.com/gpu: 1
    limits:
      memory: "6Gi"
      cpu: "2"
      nvidia.com/gpu: 1

triton:
  enabled: true
  image:
    repository: graceritamcgrath/triton-custom
    tag: "24.10-py3"
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    httpNodePort: 30910
    grpcNodePort: 30911
  openrc:
    existingSecret: "triton-openrc"
  resources:
    requests:
      memory: "8Gi"
      cpu: "2"
      ephemeral-storage: "5Gi"
    limits:
      memory: "12Gi"
      cpu: "4"
      ephemeral-storage: "10Gi"

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: "v2.51.0"
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 9090
    nodePort: 30902
  retention: "7d"
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: "10.4.0"
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 3000
    nodePort: 30903
  adminPassword: "admin"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
