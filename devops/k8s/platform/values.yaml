
data:
  driftMonitor:
    enabled: true
    existingClaim: ''
    nodeSelector: {}
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
    schedule: 0 * * * *
    tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
  jobs:
    image:
      pullPolicy: IfNotPresent
      repository: 192.168.1.11:5000/recipe-scraper-data
      tag: latest
    mountPath: /data
  persistence:
    accessMode: ReadWriteOnce
    claimName: data-pvc-gpu
    enabled: true
    size: 50Gi
    storageClass: local-path
    volumeName: data-pv-gpu-node1
  trainingQuality:
    enabled: true
    existingClaim: data-pvc-gpu
    nodeSelector: {}
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
    schedule: 0 0 * * 1,4
    tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
grafana:
  adminPassword: admin
  enabled: false
  image:
    pullPolicy: IfNotPresent
    repository: grafana/grafana
    tag: 10.4.0
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  service:
    nodePort: 30903
    port: 3000
    type: NodePort
mlflow:
  allowedHosts: '*'
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/mlflow/mlflow
    tag: v3.9.0
  loggingLevel: ERROR
  resources:
    limits:
      cpu: '1'
      memory: 2Gi
    requests:
      cpu: 200m
      memory: 1Gi
  s3:
    accessKeyId: ''
    bucketName: ObjStore_proj22
    caBundle: ''
    endpointUrl: https://chi.tacc.chameleoncloud.org:7480
    existingSecret: mlflow-s3-credentials
    preflight:
      enabled: true
    region: ''
    secretAccessKey: ''
  service:
    nodePort: 30800
    port: 8000
    type: NodePort
  trackingUri: http://0.0.0.0:8000
namespace:
  create: true
postgres:
  nodeSelector:
    kubernetes.io/hostname: node5
  auth:
    database: mlflowdb
    existingSecret: ''
    password: password
    username: user
  image:
    pullPolicy: IfNotPresent
    repository: postgres
    tag: '16'
  persistence:
    accessMode: ReadWriteOnce
    enabled: true
    existingClaim: ''
    hostLocal:
      enabled: true
      nodeHostname: node5
      path: /mnt/mlflow_persist/postgres_data
      pvName: postgres-local-pv
      reclaimPolicy: Retain
    size: 10Gi
    storageClass: ''
  service:
    port: 5432
prometheus:
  enabled: true
  image:
    pullPolicy: IfNotPresent
    repository: prom/prometheus
    tag: v2.51.0
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi
  retention: 7d
  service:
    nodePort: 30902
    port: 9090
    type: NodePort
trainingJob:
  activeDeadlineSeconds: null
  annotations: {}
  backoffLimit: 0
  enabled: true
  description: Fallback single-pod Kubernetes Job for smoke tests; prefer manual and scheduled Argo Workflows for real training runs.
  env:
    checkpointDir: /data/checkpoints/recipe-correction
    dataDir: /data
    evalJsonlPath:  '/data/eval.jsonl'
    extraArgs: ''
    hfCacheDir: /data/checkpoints/huggingface-cache
    numProcesses: '1'
    trainConfig: /app/config/config.yaml
    trainJsonlPath: '/data/train.jsonl'
    trainMode: train
    trainScript: /app/train.py
  image:
    fullName: 192.168.1.11:5000/recipe-scraper-training:latest
    pullPolicy: IfNotPresent
    repository: recipe-scraper-training
    tag: latest
  imagePullSecrets: []
  labels: {}
  mlflowPreflight:
    artifactCredentialsSecret: ''
    checkArtifactStore: true
    enabled: true
  modelCache:
    prewarmEnabled: false
  nodeSelector:
    kubernetes.io/hostname: gpu-node1
  runtimeClassName: nvidia
  podAnnotations: {}
  podLabels: {}
  resources:
    limits:
      cpu: '2'
      ephemeral-storage: 8Gi
      memory: 12Gi
      nvidia.com/gpu: 1
    requests:
      cpu: 500m
      ephemeral-storage: 2Gi
      memory: 2Gi
      nvidia.com/gpu: 1
  storage:
    claimName: data-pvc-gpu
    checkpointMountPath: /data/checkpoints
    datasetMountPath: /data
    enabled: true
    hfCacheMountPath: /data/checkpoints/huggingface-cache
    mountPath: /data
  tolerations:
  - effect: NoSchedule
    key: nvidia.com/gpu
    operator: Exists
  ttlSecondsAfterFinished: 86400
triton:
  runtimeClassName: nvidia
  persistence:
    enabled: true
    claimName: data-pvc-gpu-node2
    size: 50Gi
    storageClass: local-path
  enabled: true
  nodeSelector:
    kubernetes.io/hostname: gpu-node2
  image:
    pullPolicy: IfNotPresent
    repository: graceritamcgrath/triton-custom
    tag: 24.10-py3
  modelPrefix: 2/9ad35516dbdb42dcbfb9507122173380/artifacts/checkpoints/best
  modelVersion: 9ad35516
  openrc:
    existingSecret: triton-openrc
  resources:
    limits:
      cpu: '4'
      ephemeral-storage: 10Gi
      memory: 12Gi
    requests:
      cpu: '2'
      ephemeral-storage: 2Gi
      memory: 8Gi
  rollout:
    maxSurge: 0
    maxUnavailable: 1
  service:
    grpcNodePort: 30911
    httpNodePort: 30910
    type: NodePort
