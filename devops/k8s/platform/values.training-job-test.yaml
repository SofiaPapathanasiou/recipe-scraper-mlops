namespace:
  create: true

data:
  trainingQuality:
    enabled: false
  driftMonitor:
    enabled: false

triton:
  enabled: false

prometheus:
  enabled: false

grafana:
  enabled: false

mlflow:
  s3:
    preflight:
      enabled: false

trainingJob:
  enabled: true
  description: Enable only for Helm-based smoke tests. Manual training should be launched from the Argo Workflows UI using the recipe-model-training template.
  image:
    fullName: 192.168.1.11:5000/recipe-scraper-training:latest
    pullPolicy: Never
  mlflowPreflight:
    enabled: false
    checkArtifactStore: false
  env:
    trainJsonlPath: /data/train.jsonl
    evalJsonlPath: /data/eval.jsonl
    numProcesses: "1"
    checkpointDir: /data/checkpoints/recipe-correction
    hfCacheDir: /data/checkpoints/huggingface-cache
  storage:
    claimName: data-pvc-gpu
