apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: recipe-scraper-production
  namespace: argocd
spec:
  project: recipe-scraper
  source:
    repoURL: https://github.com/SofiaPapathanasiou/recipe-scraper-mlops.git
    targetRevision: HEAD
    path: devops/k8s/mealie
    helm:
      valueFiles:
        - values.yaml
        - values.production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: recipe-scraper-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
