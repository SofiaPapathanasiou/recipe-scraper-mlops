apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflow-executor
  namespace: recipe-scraper-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-executor
  namespace: recipe-scraper-platform
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - workflowtaskresults
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-executor
  namespace: recipe-scraper-platform
subjects:
  - kind: ServiceAccount
    name: argo-workflow-executor
    namespace: recipe-scraper-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-workflow-executor
