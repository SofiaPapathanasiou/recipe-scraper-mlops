apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: recipe-model-retraining
  namespace: recipe-scraper-platform
  annotations:
    recipe-scraper-mlops/status: "Scheduled retraining uses the shared recipe-model-training WorkflowTemplate and defaults to the shared data-pvc-gpu claim."
spec:
  schedule: "0 23 * * 1"
  timezone: Etc/UTC
  suspend: false
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  workflowSpec:
    workflowTemplateRef:
      name: recipe-model-training
    arguments:
      parameters:
        - name: training-image
          value: 192.168.1.11:5000/recipe-scraper-training:latest
        - name: training-mode
          value: train
        - name: training-config
          value: /app/config/config.yaml
        - name: pvc-name
          value: data-pvc-gpu
        - name: data-dir
          value: /data
        - name: num-processes
          value: "1"
        - name: train-jsonl-path
          value: /data/training/train.jsonl
        - name: eval-jsonl-path
          value: /data/training/eval.jsonl
        - name: checkpoint-dir
          value: /data/checkpoints/recipe-correction
        - name: hf-cache-dir
          value: /data/checkpoints/huggingface-cache
        - name: train-extra-args
          value: --experiment-name recipe-correction-t5-baseline
        - name: mlflow-tracking-uri
          value: http://192.168.1.11:30800/
        - name: mlflow-artifact-secret
          value: mlflow-s3-credentials
        - name: check-artifact-store
          value: "true"
