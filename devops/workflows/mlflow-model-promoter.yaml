apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: mlflow-model-promoter
  namespace: recipe-scraper-platform
spec:
  schedule: "*/30 * * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  workflowSpec:
    serviceAccountName: argo-workflow-executor
    entrypoint: promote-best-model
    volumes:
    - name: workspace
      emptyDir: {}
    - name: git-credentials
      secret:
        secretName: git-credentials
    templates:
    - name: promote-best-model
      initContainers:
      - name: git-clone
        image: alpine/git
        command: [sh, -c]
        args:
        - |
          set -eu
          TOKEN="$(cat /git-credentials/token)"
          REPO_URL="https://${TOKEN}@github.com/SofiaPapathanasiou/recipe-scraper-mlops.git"
          MAX_ATTEMPTS=8
          ATTEMPT=1
          BACKOFF=1

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            echo "git clone attempt ${ATTEMPT}/${MAX_ATTEMPTS}"
            if git clone "$REPO_URL" /workspace; then
              echo "git clone succeeded"
              exit 0
            fi

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              echo "git clone failed after ${MAX_ATTEMPTS} attempts"
              exit 1
            fi

            echo "git clone failed; retrying in ${BACKOFF}s"
            sleep "$BACKOFF"

            # Ensure next clone attempt starts with a clean destination.
            rm -rf /workspace/* /workspace/.[!.]* /workspace/..?* 2>/dev/null || true

            ATTEMPT=$((ATTEMPT + 1))
            BACKOFF=$((BACKOFF * 2))
            if [ "$BACKOFF" -gt 30 ]; then
              BACKOFF=30
            fi
          done
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: git-credentials
          mountPath: /git-credentials
      script:
        image: python:3.11
        command: [bash, -c]
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: git-credentials
          mountPath: /git-credentials
        source: |
          pip install requests pyyaml gitpython -q
          python3 /workspace/devops/workflows/promote.py
        env:
        - name: MLFLOW_URL
          value: "http://mlflow.recipe-scraper-platform.svc.cluster.local:8000"
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: git-credentials
              key: token
