apiVersion: v1
kind: Pod
metadata:
  name: gpu-smoke
  namespace: default
spec:
  restartPolicy: Never
  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  nodeSelector:
    nvidia.com/gpu: "true"
  containers:
  - name: smoke
    image: nvidia/cuda:12.4.1-base-ubuntu22.04
    command:
    - /bin/bash
    - -lc
    - ls -l /dev/nvidia* && echo GPU_VISIBLE=$NVIDIA_VISIBLE_DEVICES
    resources:
      limits:
        nvidia.com/gpu: 1
