---
- name: Configure kubectl access on the control-plane entrypoint
  hosts: node1
  become: yes
  vars:
    cluster_user: cc
  tasks:
    - name: Ensure kubeconfig directory exists
      ansible.builtin.file:
        path: "/home/{{ cluster_user }}/.kube"
        state: directory
        owner: "{{ cluster_user }}"
        group: "{{ cluster_user }}"
        mode: "0755"

    - name: Copy admin kubeconfig for the cluster user
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ cluster_user }}/.kube/config"
        remote_src: yes
        owner: "{{ cluster_user }}"
        group: "{{ cluster_user }}"
        mode: "0600"

    - name: Verify cluster access from node1
      ansible.builtin.command: kubectl get nodes -o wide
      become_user: "{{ cluster_user }}"
      register: kubectl_nodes
      changed_when: false

    - name: Show cluster nodes
      ansible.builtin.debug:
        msg: "{{ kubectl_nodes.stdout_lines }}"

- name: Install Argo CD CLI and show bootstrap credentials
  hosts: node1
  become: yes
  tasks:
    - name: Install Argo CD CLI
      ansible.builtin.get_url:
        url: https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
        dest: /usr/local/bin/argocd
        mode: "0755"

    - name: Verify Argo CD CLI installation
      ansible.builtin.command: argocd version --client --short
      register: argocd_version
      changed_when: false

    - name: Show Argo CD CLI version
      ansible.builtin.debug:
        msg: "{{ argocd_version.stdout_lines }}"

    - name: Read Argo CD initial admin password
      ansible.builtin.shell: |
        kubectl -n argocd get secret argocd-initial-admin-secret \
          -o jsonpath="{.data.password}" | base64 --decode
      args:
        executable: /bin/bash
      register: argocd_admin_password
      changed_when: false

    - name: Show Argo CD admin password
      ansible.builtin.debug:
        msg: "ArgoCD admin password: {{ argocd_admin_password.stdout }}"

- name: Install Argo Workflows CLI and prepare GitOps namespace
  hosts: node1
  become: yes
  tasks:
    - name: Install Argo Workflows CLI
      ansible.builtin.get_url:
        url: https://github.com/argoproj/argo-workflows/releases/download/v3.6.5/argo-linux-amd64.gz
        dest: /tmp/argo-linux-amd64.gz
        mode: "0644"

    - name: Unpack Argo Workflows CLI
      ansible.builtin.shell: |
        gunzip -f /tmp/argo-linux-amd64.gz
        install -m 0755 /tmp/argo-linux-amd64 /usr/local/bin/argo
      args:
        executable: /bin/bash

    - name: Verify Argo Workflows CLI installation
      ansible.builtin.command: argo version
      register: argo_version
      changed_when: false

    - name: Show Argo Workflows CLI version
      ansible.builtin.debug:
        msg: "{{ argo_version.stdout_lines }}"

    - name: Ensure argo-workflows namespace exists
      ansible.builtin.command: kubectl create namespace argo-workflows
      register: argo_namespace
      failed_when: argo_namespace.rc != 0 and "AlreadyExists" not in argo_namespace.stderr
      changed_when: "'created' in argo_namespace.stdout.lower()"

- name: Install NVIDIA container toolkit on CHI@TACC bare metal GPU node
  hosts: gpu-node-chi
  become: yes
  tasks:
    - name: Install NVIDIA container toolkit
      ansible.builtin.shell: |
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | \
          gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
        curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
          sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
          tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
        apt-get update
        apt-get install -y nvidia-container-toolkit
      args:
        executable: /bin/bash
      async: 300
      poll: 10

    - name: Configure NVIDIA runtime for containerd
      ansible.builtin.command: nvidia-ctk runtime configure --runtime=containerd

    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted

- name: Install NVIDIA driver and container toolkit on GPU worker nodes
  hosts: gpu-node1:gpu-node2
  become: yes
  vars:
    nvidia_driver_package: nvidia-driver-570-server
    nvidia_toolkit_keyring_path: /etc/apt/keyrings/nvidia-container-toolkit-keyring.gpg
    nvidia_toolkit_repo_path: /etc/apt/sources.list.d/nvidia-container-toolkit.list
    gpu_reboot_if_driver_changed: false
  tasks:
    - name: Ensure apt keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Install NVIDIA driver package and dependencies
      ansible.builtin.apt:
        name:
          - "{{ nvidia_driver_package }}"
          - curl
          - ca-certificates
          - gnupg
        state: present
        update_cache: yes
      register: nvidia_driver_install

    - name: Add NVIDIA container toolkit apt key
      ansible.builtin.shell: |
        set -o pipefail
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | \
          gpg --dearmor -o {{ nvidia_toolkit_keyring_path }}
      args:
        executable: /bin/bash
        creates: "{{ nvidia_toolkit_keyring_path }}"

    - name: Add NVIDIA container toolkit apt repository
      ansible.builtin.shell: |
        set -o pipefail
        curl -fsSL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
          sed 's#deb https://#deb [signed-by={{ nvidia_toolkit_keyring_path }}] https://#g' \
          > {{ nvidia_toolkit_repo_path }}
      args:
        executable: /bin/bash
        creates: "{{ nvidia_toolkit_repo_path }}"

    - name: Install NVIDIA container toolkit
      ansible.builtin.apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: yes

    - name: Configure NVIDIA runtime for containerd
      ansible.builtin.command: nvidia-ctk runtime configure --runtime=containerd
      register: nvidia_runtime_config
      changed_when: "'Wrote updated config' in nvidia_runtime_config.stdout"

    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
      when: nvidia_runtime_config.changed

    - name: Reboot GPU node when driver changed (optional)
      ansible.builtin.reboot:
        reboot_timeout: 900
        connect_timeout: 30
      when:
        - gpu_reboot_if_driver_changed | bool
        - nvidia_driver_install.changed

    - name: Verify nvidia-smi is available
      ansible.builtin.command: nvidia-smi -L
      register: nvidia_smi_output
      changed_when: false

    - name: Show discovered GPUs
      ansible.builtin.debug:
        msg: "{{ nvidia_smi_output.stdout_lines }}"

- name: Bootstrap NVIDIA GPU support
  hosts: node1
  become: yes
  vars:
    gpu_plugin_manifest: /tmp/nvidia-gpu-device-plugin.yaml
    gpu_runtimeclass_manifest: /tmp/nvidia-runtimeclass.yaml
    gpu_smoke_manifest: /tmp/gpu-smoke-pod.yaml
  tasks:
    - name: Copy NVIDIA device plugin manifest
      ansible.builtin.copy:
        src: files/nvidia-gpu-device-plugin.yaml
        dest: "{{ gpu_plugin_manifest }}"
        mode: "0644"
      when: "'gpu-node1' in groups['all'] or 'gpu-node2' in groups['all'] or 'gpu-node-chi' in groups['all']"

    - name: Apply NVIDIA device plugin manifest
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - -f
          - "{{ gpu_plugin_manifest }}"
      when: "'gpu-node1' in groups['all'] or 'gpu-node2' in groups['all'] or 'gpu-node-chi' in groups['all']"

    - name: Wait for NVIDIA device plugin rollout
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - kube-system
          - rollout
          - status
          - daemonset/nvidia-gpu-device-plugin
          - --timeout=180s
      changed_when: false
      when: "'gpu-node1' in groups['all'] or 'gpu-node2' in groups['all'] or 'gpu-node-chi' in groups['all']"

    - name: Copy NVIDIA RuntimeClass manifest
      ansible.builtin.copy:
        src: files/nvidia-runtimeclass.yaml
        dest: "{{ gpu_runtimeclass_manifest }}"
        mode: "0644"
      when: "'gpu-node1' in groups['all'] or 'gpu-node2' in groups['all'] or 'gpu-node-chi' in groups['all']"

    - name: Apply NVIDIA RuntimeClass manifest
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - -f
          - "{{ gpu_runtimeclass_manifest }}"
      when: "'gpu-node1' in groups['all'] or 'gpu-node2' in groups['all'] or 'gpu-node-chi' in groups['all']"

    - name: Copy GPU smoke test manifest
      ansible.builtin.copy:
        src: files/gpu-smoke-pod.yaml
        dest: "{{ gpu_smoke_manifest }}"
        mode: "0644"
      when: "'gpu-node1' in groups['all'] or 'gpu-node2' in groups['all'] or 'gpu-node-chi' in groups['all']"

    - name: Run GPU smoke pod
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - -f
          - "{{ gpu_smoke_manifest }}"
      when: "'gpu-node1' in groups['all'] or 'gpu-node2' in groups['all'] or 'gpu-node-chi' in groups['all']"

    - name: Wait for GPU smoke pod to complete
      ansible.builtin.command:
        argv:
          - kubectl
          - wait
          - --for=jsonpath={.status.phase}=Succeeded
          - pod/gpu-smoke
          - --timeout=180s
      changed_when: false
      when: "'gpu-node1' in groups['all'] or 'gpu-node2' in groups['all'] or 'gpu-node-chi' in groups['all']"

    - name: Show GPU smoke pod logs
      ansible.builtin.command:
        argv:
          - kubectl
          - logs
          - gpu-smoke
      register: gpu_smoke_logs
      changed_when: false
      when: "'gpu-node1' in groups['all'] or 'gpu-node2' in groups['all'] or 'gpu-node-chi' in groups['all']"

    - name: Display GPU smoke pod logs
      ansible.builtin.debug:
        msg: "{{ gpu_smoke_logs.stdout_lines }}"
      when: "'gpu-node1' in groups['all'] or 'gpu-node2' in groups['all'] or 'gpu-node-chi' in groups['all']"

    - name: Clean up GPU smoke pod
      ansible.builtin.command:
        argv:
          - kubectl
          - delete
          - pod
          - gpu-smoke
          - --ignore-not-found=true
      changed_when: false
      when: "'gpu-node1' in groups['all'] or 'gpu-node2' in groups['all'] or 'gpu-node-chi' in groups['all']"

- name: Enforce Calico host policy required for NodeLocal DNS + service DNS reachability
  hosts: node1
  become: yes
  vars:
    calico_allow_wireguard_policy_manifest: /tmp/calico-allow-wireguard-policy.yaml
  tasks:
    - name: Check whether Calico GlobalNetworkPolicy CRD exists
      ansible.builtin.command:
        argv:
          - kubectl
          - get
          - crd
          - globalnetworkpolicies.crd.projectcalico.org
      register: calico_gnp_crd
      changed_when: false
      failed_when: false

    - name: Write Calico allow-wireguard GlobalNetworkPolicy manifest
      ansible.builtin.copy:
        dest: "{{ calico_allow_wireguard_policy_manifest }}"
        mode: "0644"
        content: |
          apiVersion: crd.projectcalico.org/v1
          kind: GlobalNetworkPolicy
          metadata:
            name: allow-wireguard
          spec:
            order: 0
            selector: all()
            ingress:
              - action: Allow
                source:
                  nets:
                    - 192.168.1.0/24
                    - 10.233.0.0/18
                    - 10.233.64.0/18
                    - 169.254.25.10/32
            egress:
              - action: Allow
                destination:
                  nets:
                    - 192.168.1.0/24
                    - 10.233.0.0/18
                    - 10.233.64.0/18
                    - 169.254.25.10/32
      when: calico_gnp_crd.rc == 0

    - name: Apply Calico allow-wireguard GlobalNetworkPolicy
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - -f
          - "{{ calico_allow_wireguard_policy_manifest }}"
      when: calico_gnp_crd.rc == 0
