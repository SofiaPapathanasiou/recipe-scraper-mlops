- name: Submit manual training workflow from the repo
  hosts: node1
  become: yes
  vars:
    repo_url: https://github.com/SofiaPapathanasiou/recipe-scraper-mlops.git
    repo_dest: /tmp/recipe-scraper-mlops
    workflow_file: devops/workflows/manual-training-workflow.yaml
    workflow_namespace: recipe-scraper-platform

  tasks:
    - name: Clone or update recipe-scraper-mlops repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dest }}"
        version: main

    - name: Submit manual workflow
      command: kubectl create -f {{ repo_dest }}/{{ workflow_file }}
      register: workflow_submit

    - name: Extract Workflow Name
      set_fact:
        workflow_name_generated: "{{ workflow_submit.stdout.split(' ')[0].split('/')[1] }}"

    - name: Wait for workflow to reach a terminal condition
      shell: |
        kubectl -n {{ workflow_namespace }} wait --for=condition=Completed workflow/{{ workflow_name_generated }} --timeout=600s
      register: workflow_status
      failed_when: false

    - name: Get final workflow result
      shell: |
        kubectl -n {{ workflow_namespace }} get workflow {{ workflow_name_generated }} -o jsonpath="{.status.phase}"
      register: workflow_phase

    - name: Display workflow phase
      debug:
        msg: "Workflow {{ workflow_name_generated }} finished with status: {{ workflow_phase.stdout }}"

    - name: Show note for pending GPU-bound workflows
      debug:
        msg: "A Pending phase is expected while Triton holds the only GPU on gpu-node."
      when: workflow_phase.stdout == "Pending"
