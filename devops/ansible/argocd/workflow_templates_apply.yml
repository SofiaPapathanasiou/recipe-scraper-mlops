---
- name: Apply recipe-scraper workflow resources directly
  hosts: node1
  become: yes
  vars:
    repo_url: https://github.com/SofiaPapathanasiou/recipe-scraper-mlops.git
    repo_dest: /tmp/recipe-scraper-mlops
    workflow_namespace: recipe-scraper-platform
    workflow_files:
      - devops/workflows/rbac.yaml
      - devops/workflows/workflow-template-training.yaml
      - devops/workflows/cronworkflow-retraining.yaml

  tasks:
    - name: Clone or update recipe-scraper-mlops repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dest }}"
        version: main

    - name: Apply workflow resources
      command: kubectl apply -f {{ repo_dest }}/{{ item }}
      loop: "{{ workflow_files }}"
      loop_control:
        label: "{{ item }}"

    - name: Verify applied workflow templates
      command: kubectl get workflowtemplates -n {{ workflow_namespace }}
      register: wft_list

    - name: Show workflow templates
      debug:
        var: wft_list.stdout
