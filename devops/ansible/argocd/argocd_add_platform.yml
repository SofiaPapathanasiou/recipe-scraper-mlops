---
- name: Deploy MLflow platform via ArgoCD & Helm with secret handling
  hosts: node1
  become: yes
  vars:
    argocd_username: "admin"
    repo_path: "https://github.com/SofiaPapathanasiou/recipe-scraper-mlops.git"
    app_name: "recipe-scraper-platform"
    app_path: "devops/k8s/platform"
    postgres_username: "user"
    postgres_db: "mlflowdb"

  tasks:
    - name: Get ArgoCD admin password from Kubernetes secret
      command: >
        kubectl get secret -n argocd argocd-initial-admin-secret \
        -o jsonpath="{.data.password}"
      register: argocd_password_base64

    - name: Decode ArgoCD admin password
      shell: echo {{ argocd_password_base64.stdout }} | base64 --decode
      register: argocd_password

    - name: Log in to ArgoCD
      command: >
        argocd login localhost --username {{ argocd_username }} \
        --password "{{ argocd_password.stdout }}" --grpc-web --port-forward --port-forward-namespace=argocd
      register: login_result
      changed_when: false

    - name: Add repository to ArgoCD
      command: >
        argocd repo add {{ repo_path }} --port-forward --port-forward-namespace=argocd
      register: repo_result
      changed_when: "'Repository already exists' not in repo_result.stderr"

    - name: Detect external IP starting with 10.56
      set_fact:
        external_ip: "{{ ansible_all_ipv4_addresses | select('match', '^10\\.56\\..*') | list | first }}"

    - name: Ensure recipe-scraper-platform namespace exists
      command: kubectl get namespace recipe-scraper-platform
      register: ns_check
      failed_when: false
      changed_when: false

    - name: Create recipe-scraper-platform namespace if missing
      when: ns_check.rc != 0
      command: kubectl create namespace recipe-scraper-platform

    - name: Check if Postgres secret already exists
      command: kubectl get secret postgres-credentials -n recipe-scraper-platform
      register: postgres_secret_check
      failed_when: false
      changed_when: false

    - name: Generate Postgres password
      when: postgres_secret_check.rc != 0
      set_fact:
        postgres_password: "{{ lookup('password', '/dev/null length=20 chars=ascii_letters,digits') }}"

    - name: Create Postgres credentials secret
      when: postgres_secret_check.rc != 0
      command: >
        kubectl create secret generic postgres-credentials
        --namespace recipe-scraper-platform
        --from-literal=username={{ postgres_username }}
        --from-literal=password={{ postgres_password }}
        --from-literal=dbname={{ postgres_db }}
      register: postgres_secret_create

    - name: Check if MLflow S3 secret already exists
      command: kubectl get secret mlflow-s3-credentials -n recipe-scraper-platform
      register: mlflow_s3_secret_check
      failed_when: false
      changed_when: false

    - name: Create MLflow S3 credentials secret
      when: mlflow_s3_secret_check.rc != 0
      command: >
        kubectl create secret generic mlflow-s3-credentials
        --namespace recipe-scraper-platform
        --from-literal=AWS_ACCESS_KEY_ID={{ lookup('env', 'OS_APPLICATION_CREDENTIAL_ID') }}
        --from-literal=AWS_SECRET_ACCESS_KEY={{ lookup('env', 'OS_APPLICATION_CREDENTIAL_SECRET') }}
        --from-literal=BUCKET_NAME={{ lookup('env', 'MLFLOW_BUCKET_NAME') }}
      register: mlflow_s3_secret_create

    - name: Check if ArgoCD application exists
      command: >
        argocd app get {{ app_name }} --port-forward --port-forward-namespace=argocd
      register: app_check
      failed_when: false
      changed_when: false

    - name: Create ArgoCD Helm application if it does not exist
      when: app_check.rc != 0
      command: >
        argocd app create {{ app_name }} \
        --repo {{ repo_path }} \
        --path {{ app_path }} \
        --dest-server https://kubernetes.default.svc \
        --dest-namespace "" \
        --helm-set-string mlflow.externalIP={{ external_ip }} \
        --port-forward --port-forward-namespace=argocd \
        --sync-policy automated --self-heal
      register: app_create

    - name: Update ArgoCD Helm application if it exists
      when: app_check.rc == 0
      command: >
        argocd app set {{ app_name }} \
        --dest-namespace "" \
        --helm-set-string mlflow.externalIP={{ external_ip }} \
        --port-forward --port-forward-namespace=argocd
      register: app_update
